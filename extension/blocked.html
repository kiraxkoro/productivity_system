<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blocked — Focus OS</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f1115;
        color: #e8eaf0;
        font-family: Inter, "Segoe UI", system-ui, sans-serif;
        text-align: center;
      }
      .card {
        padding: 48px 40px;
        max-width: 460px;
      }
      .lock {
        font-size: 4rem;
        margin-bottom: 8px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 1.6rem;
      }
      p {
        color: #8a91a3;
        line-height: 1.6;
        margin: 0 0 6px;
      }
      .until {
        display: inline-block;
        margin-top: 18px;
        padding: 8px 18px;
        border-radius: 999px;
        background: rgba(124, 92, 255, 0.18);
        color: #b3a1ff;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="lock">🔒</div>
      <h1>Not now.</h1>
      <p>This site is blocked while your focus block is running.</p>
      <p>Future you already thanked present you. Go finish the thing.</p>
      <div class="until" id="until"></div>
    </div>
    <script src="blocked.js"></script>
  </body>
</html>
