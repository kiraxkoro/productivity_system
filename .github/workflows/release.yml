name: Build & Release (desktop)

# Builds Focus OS for Windows and macOS in the cloud, then attaches both
# installers to a GitHub Release on this repo. Trigger it by pushing a tag
# like `v0.1.0`, or run it by hand from the Actions tab.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS: one universal build that runs on Intel and Apple Silicon.
          - platform: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target universal-apple-darwin --bundles dmg
          # Windows: the same NSIS setup .exe we ship locally.
          - platform: windows-latest
            rust-targets: ""
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build app and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: Focus OS ${{ inputs.tag || github.ref_name }}
          releaseBody: |
            Download the installer for your system:
            - **Windows** — the `.exe` setup file
            - **Mac** — the `.dmg` file (works on Intel and Apple Silicon)

            These builds are not code-signed yet, so your OS will warn on first launch:
            - Windows: "More info" -> "Run anyway"
            - Mac: right-click the app -> "Open", or run `xattr -cr /Applications/focus-os.app`
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
