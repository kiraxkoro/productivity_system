name: Build & Release (desktop + Android)

# Builds Focus OS for Windows, macOS, and Android in the cloud, then attaches
# the installers/APK to a GitHub Release on this repo. Trigger it by pushing
# a tag like `v0.1.0`, or run it by hand from the Actions tab.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS: one universal build that runs on Intel and Apple Silicon.
          - platform: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target universal-apple-darwin --bundles dmg
          # Windows: the same NSIS setup .exe we ship locally.
          - platform: windows-latest
            rust-targets: ""
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build app and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: Focus OS ${{ inputs.tag || github.ref_name }}
          releaseBody: |
            Download the installer for your system:
            - **Windows** — the `.exe` setup file
            - **Mac** — the `.dmg` file (works on Intel and Apple Silicon)
            - **Android** — the `.apk` file (added a few minutes later by a separate build job; refresh this page if it's not here yet)

            These builds are not code-signed yet, so your OS will warn on first launch:
            - Windows: "More info" -> "Run anyway"
            - Mac: right-click the app -> "Open", or run `xattr -cr /Applications/focus-os.app`
            - Android: tap the downloaded `.apk` -> when blocked, follow the prompt to allow installs from this source -> Install
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  release-android:
    needs: release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: 27.0.12077973
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + platform
        run: sdkmanager --install "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;${NDK_VERSION}"

      - name: Set up Rust with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Init Android project
        run: npm run tauri android init
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}

      # Debug-signed, matching desktop builds not being code-signed yet —
      # installable by anyone via sideloading, same tradeoff as the .exe/.dmg.
      - name: Build APK
        run: npm run tauri android build -- --debug --target aarch64 --apk
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}

      - name: Attach APK to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
